name: CI/CD - Tests and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Debug environment
        run: |
          echo "--- python info ---"
          python -c "import sys, os; print('python', sys.version); print('sys.path:', sys.path); print('cwd:', os.getcwd())"
          echo "--- repo files ---"
          ls -la
          echo "--- root listing ---"
          python -c "import pkgutil; print('packages:', [m.name for m in pkgutil.iter_modules()][:20])"

      - name: Run unit tests
        run: |
          python -m unittest discover -v

      - name: Build static site
        run: |
          python -m calculator.site_builder

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
